services:
  - type: web
    name: php-app
    runtime: php
    plan: free
    buildCommand: composer install
    startCommand: "php -S 0.0.0.0:$PORT"
    envVars:
      - key: DB_HOST
        value: localhost
      - key: DB_USER
        value: root
      - key: DB_PASSWORD
        value: ""
      - key: DB_NAME
        value: user_db
